services:
  rust-gtk-appimage:
    # Reproduce CI pipeline env
    build:
      context: ../
      dockerfile: ./package/appimage.Dockerfile
      args:
        USER_UID: "1000"
        USER_GID: "1000"
    volumes:
      - ../:/mnt:z
#    command: /bin/bash -c "cargo appimage"
#    command: /bin/bash -c "appimage --features adwaita"
    command: tail -f /dev/null

  rust-gtk-archlinux:
    # Reproduce CI pipeline env
    build:
      context: ../
      dockerfile: ./package/arch.Dockerfile
    volumes:
      - ../:/mnt:z
    command: tail -f /dev/null